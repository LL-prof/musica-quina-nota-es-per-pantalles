<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lectura Musical</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f1220;
  overflow:hidden;
}

.app{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  padding:10px;
  color:#fff;
}

/* SCORE */
.score{
  font-size:22px;
  font-weight:900;
  text-align:center;
}

/* PROGRESS */
.progressWrap{
  width:80%;
  height:10px;
  background:#333;
  border-radius:999px;
  overflow:hidden;
}
.progress{
  height:100%;
  width:0%;
  background:#25c26e;
  transition:.3s;
}

/* SHEET */
.sheet{
  width:100%;
  max-height:50vh;
  background:#fff;
  border-radius:12px;
  position:relative;
}

svg{
  width:100%;
  height:100%;
}

/* PLAYHEAD */
.playhead{
  position:absolute;
  top:10px;
  bottom:10px;
  width:3px;
  background:red;
  opacity:0;
}

/* OPTIONS */
.options{
  margin-top:80px;
  display:flex;
  justify-content:center;
  gap:16px;
}

.opt{
  min-width:90px;
  padding:12px 18px;
  background:#fff;
  border:2px solid #ddd;
  border-radius:10px;
  font-weight:900;
  cursor:pointer;
}

/* CONFETI */
.confetti{
  position:absolute;
  width:6px;height:6px;
  animation:confetti .6s ease-out forwards;
}
@keyframes confetti{
  to{opacity:0; transform:translate(var(--dx),var(--dy));}
}

/* FINAL */
.final{
  position:absolute;
  inset:0;
  background:#000c;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
</style>
</head>

<body>
<div class="app">

<div class="score" id="score">0 pts</div>

<div class="progressWrap">
  <div class="progress" id="progress"></div>
</div>

<div class="sheet">
  <div class="playhead" id="playhead"></div>
  <svg viewBox="0 0 760 260">
    <g stroke="#000" stroke-width="2">
      <line x1="40" y1="80" x2="720" y2="80"/>
      <line x1="40" y1="105" x2="720" y2="105"/>
      <line x1="40" y1="130" x2="720" y2="130"/>
      <line x1="40" y1="155" x2="720" y2="155"/>
      <line x1="40" y1="180" x2="720" y2="180"/>
    </g>
    <text x="50" y="150" font-size="50">𝄞</text>
    <g id="notes"></g>
  </svg>
</div>

<button onclick="playSeq()">▶</button>

<div class="options">
  <button class="opt" id="o0"></button>
  <button class="opt" id="o1"></button>
  <button class="opt" id="o2"></button>
</div>

</div>

<div class="final" id="final">
  <h2>Resultado</h2>
  <div id="finalScore"></div>
  <button onclick="download()">Descargar</button>
</div>

<script>
/* ===== CONFIG ===== */
const MAP = {
  do:"do_negra.mp3",
  re:"re_negra.mp3",
  mi:"mi_negra.mp3",
  fa:"fa_negra.mp3",
  sol:"sol_negra.mp3",
  la:"la_negra.mp3",
  si:"si_negra.mp3",
  do2:"do_sup_negra.mp3"
};

const NOTES = Object.keys(MAP);
const OFF = { do:+2, re:+1, mi:0, fa:-1, sol:-2, la:-3, si:-4, do2:-5 };
const lineGap = 25;

/* ===== AUDIO ===== */
let ctx = new AudioContext();
let cache = {};

async function load(n){
  if(cache[n]) return cache[n];
  let res = await fetch(MAP[n]);
  let buf = await res.arrayBuffer();
  let dec = await ctx.decodeAudioData(buf);
  cache[n]=dec;
  return dec;
}

function playBuffer(buf,t){
  let s = ctx.createBufferSource();
  s.buffer=buf;
  s.connect(ctx.destination);
  s.start(t);
  return buf.duration;
}

/* ===== PLAY SEQ ===== */
async function playSeq(){
  let t = ctx.currentTime;
  const xs = [];
  seq.forEach((n,i)=>{
    xs.push(260+i*100);
  });

  playhead.style.opacity=1;

  for(let i=0;i<seq.length;i++){
    let b = await load(seq[i]);
    movePlayhead(xs[i]);
    t += playBuffer(b,t)+0.05;
  }

  setTimeout(()=>playhead.style.opacity=0,500);
}

function movePlayhead(x){
  const px = (x/760)*document.querySelector(".sheet").clientWidth;
  playhead.style.left = px+"px";
}

/* ===== POS ===== */
function yFor(n){
  return 180 + OFF[n]*(lineGap/2);
}

/* ===== DRAW ===== */
function draw(){
  notes.innerHTML="";
  seq.forEach((n,i)=>{
    let x=260+i*100;
    let y=yFor(n);
    let r=lineGap/2;

    let extra="";

    /* línea interior si está en línea */
    if(OFF[n]%2===0){
      extra += `<line x1="${x-r}" y1="${y}" x2="${x+r}" y2="${y}" stroke="black" stroke-width="2"/>`;
    }

    /* ledger lines */
    if(n==="do"){
      extra += `<line x1="${x-20}" y1="${y}" x2="${x+20}" y2="${y}" stroke="black" stroke-width="2"/>`;
    }
    if(n==="do2"){
      extra += `<line x1="${x-20}" y1="${y}" x2="${x+20}" y2="${y}" stroke="black" stroke-width="2"/>`;
    }

    notes.innerHTML += `
      ${extra}
      <circle cx="${x}" cy="${y}" r="${r}" fill="white" stroke="black" stroke-width="2"/>
    `;
  });
}

/* ===== OPTIONS ===== */
function rand(){
  return NOTES[Math.floor(Math.random()*NOTES.length)];
}

function gen(correct){
  let arr=[correct];
  while(arr.length<3){
    let n=rand();
    if(!arr.includes(n)) arr.push(n);
  }
  return arr.sort(()=>Math.random()-0.5);
}

function update(){
  let c = seq[seq.length-1];
  let opts = gen(c);

  opts.forEach((o,i)=>{
    let b=document.getElementById("o"+i);
    b.textContent=o==="do2"?"do↑":o;
    b.onclick=()=>answer(o,c,b);
  });
}

/* ===== CONFETI ===== */
function confetti(el){
  let r=el.getBoundingClientRect();
  for(let i=0;i<10;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=(r.left+r.width/2)+"px";
    c.style.top=r.top+"px";
    c.style.background=["#f1c40f","#2ecc71","#3498db"][i%3];
    c.style.setProperty("--dx",(Math.random()*80-40)+"px");
    c.style.setProperty("--dy",(Math.random()*-80)+"px");
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),600);
  }
}

/* ===== STATE ===== */
let seq=[], step=0, round=0, score=0;
let logs=[];

/* ===== ANSWER ===== */
function answer(a,c,b){
  let ok=a===c;

  logs.push({round,step,c,a,ok});

  if(ok){
    score+=100;
    confetti(b);
  }else{
    score-=50;
  }

  scoreEl.textContent=score+" pts";
  next();
}

/* ===== NEXT ===== */
function next(){

  if(seq.length===0) seq=[rand()];
  else if(seq.length===1) seq.push(rand());
  else if(seq.length===2) seq.push(rand());
  else{
    seq=[rand()];
    round++;
    progress.style.width = (round/10*100)+"%";
  }

  step++;

  if(round>=10){
    final.style.display="flex";
    finalScore.textContent=score+" pts";
    return;
  }

  draw();
  update();
}

/* ===== DOWNLOAD ===== */
function download(){
  let blob=new Blob([JSON.stringify({score,logs},null,2)]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="resultados.json";
  a.click();
}

/* ===== INIT ===== */
next();
</script>

</body>
</html>
